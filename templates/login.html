<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Healthcare Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <div class="login-card">
            <div class="brand">
                <div class="brand-badge">H</div>
                <div>
                    <p class="brand-name">Healthcare Portal</p>
                    <p class="brand-subtitle">Welcome back, sign in to continue</p>
                </div>
            </div>

            <h2>Login</h2>
            <p class="subtitle">Access your dashboard, appointments, and profile in one place.</p>

            <form method="POST" class="login-form">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit">Sign In</button>
            </form>

            <p class="footer-text">
                Don’t have an account?
                <a href="/register">Create new account</a>
            </p>
        </div>
    </div>
</body>
</html>
